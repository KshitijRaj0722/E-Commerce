spring.application.name=ecommerce

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:ecommerce-guvi-secret-key-2024-very-long-secret-for-security}
app.jwt.expiration=86400000

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:your_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
